<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Beautiful gradient from neon emerald to deep forest green -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>
  
  <!-- Outer glowing rings representing GPS/navigation coordinates -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#emeraldGrad)" stroke-width="12" opacity="0.15" />
  <circle cx="256" cy="256" r="210" fill="#070a08" stroke="url(#emeraldGrad)" stroke-width="4" stroke-dasharray="15 10" opacity="0.4" />
  
  <!-- Sleek Mountain Triangles -->
  <!-- Background Mountain -->
  <polygon points="120,380 392,380 256,160" fill="#13231a" stroke="#1b3d2b" stroke-width="4" />
  
  <!-- Foreground Mountain -->
  <polygon points="170,380 430,380 300,120" fill="url(#emeraldGrad)" />
  
  <!-- Mountain snow cap overlay -->
  <polygon points="300,120 270,165 290,170 300,160 315,175 330,165" fill="#ffffff" />
  
  <!-- Route track dash lines -->
  <path d="M120 380 Q 200 350 300 120" fill="none" stroke="#f97316" stroke-width="6" stroke-dasharray="10 8" />
  
  <!-- GPS Orange Location Pin at the summit -->
  <g transform="translate(294, 110) scale(1)">
    <!-- Pin body -->
    <path d="M 0,0 C -12,-12 -18,-24 -18,-36 C -18,-50 -8,-60 6,-60 C 20,-60 30,-50 30,-36 C 30,-24 24,-12 12,0 L 6,10 Z" fill="url(#orangeGrad)" />
    <!-- Pin inner dot -->
    <circle cx="6" cy="-36" r="8" fill="#ffffff" />
  </g>
</svg>